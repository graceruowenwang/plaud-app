<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <title>PlaudApp</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, iframe { width: 100%; height: 100%; border: none; overflow: hidden; }
    body { background: #0f172a; }
    #loader {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      background: #0f172a; z-index: 9999; color: #94a3b8;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-size: 14px;
    }
    .spinner {
      width: 32px; height: 32px; border: 3px solid #1e293b;
      border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite;
      margin-right: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loader"><div class="spinner"></div>Loading...</div>
    <iframe id="app" src="http://134.175.249.19:3000" allow="camera; microphone; autoplay"></iframe>
  <script>
    const iframe = document.getElementById('app');
    const loader = document.getElementById('loader');
    iframe.onload = () => { loader.style.display = 'none'; };
    // Timeout: hide loader after 10s even if not loaded
    setTimeout(() => { loader.style.display = 'none'; }, 10000);
  </script>
</body>
</html>
